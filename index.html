<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will you be my Valentine?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      font-family: Arial, sans-serif;
      padding: 1rem;
      overflow-x: hidden;
    }

    .card {
      text-align: center;
      max-width: 90vw;
    }

    .card-image {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      object-fit: cover;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: #ff69b4;
      margin-bottom: 2.5rem;
      line-height: 1.2;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      min-height: 140px;
      position: relative;
      width: 100%;
    }

    .btn {
      padding: 1rem 2rem;
      font-size: 1.25rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      position: relative;
      touch-action: none;
    }

    .btn-yes {
      background: #ff69b4;
      color: white;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
      text-decoration: none;
    }

    .btn-yes:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
    }

    .btn-no {
      background: #ff69b4;
      color: white;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.2);
      position: absolute;
      left: 50%;
      top: 4.5rem;
      transform: translateX(-50%);
    }

    .btn-no:active {
      outline: none;
    }

    .no-btn-row {
      height: 52px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="image1.png" alt="" class="card-image">
    <h1>Will you be my Valentine's?</h1>
    <div class="buttons">
      <a href="yes.html" class="btn btn-yes">Yes</a>
      <div class="no-btn-row" aria-hidden="true"></div>
      <button type="button" class="btn btn-no" id="noBtn">No</button>
      <p>(Click the No button its funny)</p>
    </div>
  </div>

  <script>
    (function() {
      const noBtn = document.getElementById('noBtn');
      const container = document.querySelector('.buttons');
      const padding = 20;
      const runDistance = 80;

      function getContainerRect() {
        return container.getBoundingClientRect();
      }

      function randomOffset() {
        return (Math.random() - 0.5) * 2 * runDistance;
      }

      function moveButton(clientX, clientY) {
        const rect = noBtn.getBoundingClientRect();
        const btnCenterX = rect.left + rect.width / 2;
        const btnCenterY = rect.top + rect.height / 2;
        const distX = clientX - btnCenterX;
        const distY = clientY - btnCenterY;
        const distance = Math.hypot(distX, distY);
        const threshold = 120;

        if (distance < threshold) {
          const cr = getContainerRect();
          const style = window.getComputedStyle(noBtn);
          let left = parseFloat(noBtn.style.left) || 0;
          let top = parseFloat(noBtn.style.top) || 0;

          let newLeft = left + (distX > 0 ? -1 : 1) * (runDistance + randomOffset() * 0.5);
          let newTop = top + (distY > 0 ? -1 : 1) * (runDistance + randomOffset() * 0.5);

          const maxLeft = cr.width / 2 - rect.width - padding;
          const maxTop = cr.height / 2 - rect.height - padding;
          newLeft = Math.max(-maxLeft, Math.min(maxLeft, newLeft));
          newTop = Math.max(-maxTop, Math.min(maxTop, newTop));

          noBtn.style.transform = '';
          noBtn.style.left = newLeft + 'px';
          noBtn.style.top = newTop + 'px';
        }
      }

      document.addEventListener('mousemove', function(e) {
        moveButton(e.clientX, e.clientY);
      });

      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 0) {
          const t = e.touches[0];
          moveButton(t.clientX, t.clientY);
        }
      }, { passive: true });

      noBtn.addEventListener('touchstart', function(e) {
        if (e.touches.length > 0) {
          const t = e.touches[0];
          moveButton(t.clientX, t.clientY);
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
